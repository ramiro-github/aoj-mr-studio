name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download Android platform-tools (bundled adb)
        shell: pwsh
        run: |
          $url = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          Invoke-WebRequest -Uri $url -OutFile platform-tools.zip
          Expand-Archive -Path platform-tools.zip -DestinationPath . -Force
          ./scripts/copy-adb.ps1 -PlatformToolsDir "./platform-tools"

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest

      - name: Build executable
        run: pyinstaller --clean --noconfirm aoj-mr-studio.spec

      - name: Verify build output
        shell: pwsh
        run: |
          $out = "dist/AOJ MR Studio"
          $exe = Join-Path $out "AOJ MR Studio.exe"
          $adb = Join-Path $out "adb/adb.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          if (-not (Test-Path $adb)) { throw "Missing bundled $adb" }
          foreach ($name in @("AdbWinApi.dll", "AdbWinUsbApi.dll")) {
            $dll = Join-Path $out "adb/$name"
            if (-not (Test-Path $dll)) { throw "Missing bundled $dll" }
          }

      - name: Create zip
        shell: pwsh
        run: |
          $zip = "AOJ-MR-Studio-${{ github.ref_name }}-win64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist/AOJ MR Studio" -DestinationPath $zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AOJ-MR-Studio-${{ github.ref_name }}-win64.zip
          generate_release_notes: true
          body: |
            ## Download (users — do not clone)

            Download **`AOJ-MR-Studio-${{ github.ref_name }}-win64.zip`** below.

            1. Extract the zip (folder **`AOJ MR Studio`**)
            2. Run **`AOJ MR Studio.exe`**
            3. Keep the whole folder — includes bundled **`adb/`**

            **Do not** `git clone` this repository to use the app. The repo is source code for developers only. No Python install required.

            Bundled `adb.exe` is subject to the [Android SDK terms](https://developer.android.com/studio/terms).
